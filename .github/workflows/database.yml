name: Database

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Database operation'
        required: true
        type: choice
        options:
          - migrate
          - seed
          - push
      tier:
        description: 'Seed tier (for seed operation)'
        required: false
        type: choice
        options:
          - '1'
          - '2'
          - '3'
        default: '1'

jobs:
  migrate:
    name: DB Push Schema
    runs-on: ubuntu-latest
    if: github.event.inputs.operation == 'migrate'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Run DB Push
        run: npx supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  push:
    name: DB Push (with seed)
    runs-on: ubuntu-latest
    if: github.event.inputs.operation == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Push schema
        run: npx supabase db reset --db-url="${{ secrets.DATABASE_URL }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  seed:
    name: DB Seed
    runs-on: ubuntu-latest
    if: github.event.inputs.operation == 'seed'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Seed
        run: pnpm db:seed -- --tier=${{ github.event.inputs.tier }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}